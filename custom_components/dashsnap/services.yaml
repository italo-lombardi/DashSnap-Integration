record:
  name: Record URL
  description: Record any web page to video or screenshot via DashSnap. Provide a full URL.
  fields:
    url:
      name: URL
      description: Full URL of the page to capture, e.g. https://grafana.example.com/d/xyz or https://www.example.com.
      required: true
      example: https://grafana.example.com/d/xyz
      selector:
        text:
    target:
      name: Target
      description: >-
        Named target from your DashSnap configuration. Targets define the authentication
        strategy for a destination (e.g. "ha" for Home Assistant, "grafana" for a Grafana instance).
        Defaults to the built-in "public" target (no authentication) if omitted.
        Check your DashSnap targets at GET /targets on the DashSnap API.
      required: false
      example: grafana
      selector:
        text:
    seconds:
      name: Duration (seconds)
      description: Video length. Ignored when format is png.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 600
          unit_of_measurement: seconds
    delay:
      name: Delay (seconds)
      description: Wait this many seconds after the page loads before capturing. Useful for dashboards that take time to render data.
      required: false
      default: 0
      advanced: true
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds
    format:
      name: Format
      description: webm video or a single png screenshot.
      required: false
      default: webm
      selector:
        select:
          options:
            - webm
            - png
    viewport_width:
      name: Viewport width
      description: Render width in pixels.
      required: false
      advanced: true
      selector:
        number:
          min: 320
          max: 3840
          unit_of_measurement: px
    viewport_height:
      name: Viewport height
      description: Render height in pixels.
      required: false
      advanced: true
      selector:
        number:
          min: 240
          max: 2160
          unit_of_measurement: px

record_ha:
  name: Record HA dashboard
  description: Record a Home Assistant page to video or screenshot. Provide a path — the HA base URL is applied automatically from the target config.
  fields:
    path:
      name: Page path
      description: HA route to capture, e.g. /lovelace/0 or /history.
      required: true
      example: /lovelace/0
      selector:
        text:
    target:
      name: Target
      description: >-
        Named ha_token target from your DashSnap configuration (e.g. "ha").
        Must have a base_url and ha_token strategy. Defaults to the first configured ha_token target.
        Check your DashSnap targets at GET /targets on the DashSnap API.
      required: false
      example: ha
      selector:
        text:
    seconds:
      name: Duration (seconds)
      description: Video length. Ignored when format is png.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 600
          unit_of_measurement: seconds
    delay:

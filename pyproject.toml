[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "SIM105", "SIM117"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.coverage.run]
source = ["custom_components/dashsnap"]
omit = ["tests/*"]
branch = true

[tool.coverage.report]
fail_under = 100
show_missing = true
